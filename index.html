  // ---------- Events ----------
  function bindEvents(){
    root.querySelectorAll("[data-nav]").forEach(el=>el.addEventListener("click", ()=>{
      state.view = el.getAttribute("data-nav");
      render();
    }));
    root.querySelectorAll("[data-openaddmodal]").forEach(el=>el.addEventListener("click", ()=>{
      const pid = el.getAttribute("data-openaddmodal");
      const product = state.products.find(p=>p.id===pid);
      const initialSubDept = (product.subDepartments && product.subDepartments.length===1) ? product.subDepartments[0] : null;
      const initialFit = (product.fitOptions && product.fitOptions.length===1) ? product.fitOptions[0] : null;
      state.cartModal = { product, size: product.sizes.length===1?product.sizes[0]:null, subDept: initialSubDept, department: null, fit: initialFit, activePhoto: 0 };
      render();
    }));
    const closeAddCartModal = root.querySelector("#close-addcart-modal");
    if(closeAddCartModal){ closeAddCartModal.addEventListener("click", ()=>{ state.cartModal=null; state.photoZoomOpen=false; render(); }); }
    root.querySelectorAll("[data-open-installment-info]").forEach(el=>el.addEventListener("click", (ev)=>{
      ev.stopPropagation();
      state.installmentInfoOpen = true;
      render();
    }));
    const closeInstallmentModal = root.querySelector("#close-installment-modal");
    if(closeInstallmentModal){ closeInstallmentModal.addEventListener("click", ()=>{ state.installmentInfoOpen=false; render(); }); }
    root.querySelectorAll("[data-open-size-guide]").forEach(el=>el.addEventListener("click", (ev)=>{
      ev.stopPropagation();
      state.sizeGuideOpen = true;
      render();
    }));
    const closeSizeGuideModal = root.querySelector("#close-sizeguide-modal");
    if(closeSizeGuideModal){ closeSizeGuideModal.addEventListener("click", ()=>{ state.sizeGuideOpen=false; render(); }); }
    root.querySelectorAll("[data-open-photo-zoom]").forEach(el=>el.addEventListener("click", (ev)=>{
      ev.stopPropagation();
      state.photoZoomOpen = true;
      render();
    }));
    const closePhotoZoomModal = root.querySelector("#close-photozoom-modal");
    if(closePhotoZoomModal){ closePhotoZoomModal.addEventListener("click", ()=>{ state.photoZoomOpen=false; render(); }); }
    const photoZoomOverlay = root.querySelector("#modal-overlay-photozoom");
    if(photoZoomOverlay){ photoZoomOverlay.addEventListener("click", (ev)=>{ if(ev.target===photoZoomOverlay){ state.photoZoomOpen=false; render(); } }); }
    root.querySelectorAll("[data-write-review]").forEach(el=>el.addEventListener("click", ()=>{
      const productId = el.getAttribute("data-write-review");
      state.reviewModal = { productId, rating: 0, comment: "", submitting: false };
      render();
    }));
    root.querySelectorAll("[data-star]").forEach(el=>el.addEventListener("click", ()=>{
      state.reviewModal.rating = Number(el.getAttribute("data-star"));
      render();
    }));
    const reviewCommentInput = root.querySelector("#review-comment-input");
    if(reviewCommentInput){
      reviewCommentInput.addEventListener("input", e=>{ state.reviewModal.comment = e.target.value; });
    }
    const closeWriteReviewModal = root.querySelector("#close-writereview-modal");
    if(closeWriteReviewModal){
      closeWriteReviewModal.addEventListener("click", ()=>{
        if(state.reviewModal && state.reviewModal.submitting) return;
        state.reviewModal = null; render();
      });
    }
    const submitReviewBtn = root.querySelector("#submit-review-btn");
    if(submitReviewBtn){ submitReviewBtn.addEventListener("click", submitReview); }
    root.querySelectorAll("[data-modal-size]").forEach(el=>el.addEventListener("click", ()=>{
      state.cartModal.size = el.getAttribute("data-modal-size"); render();
    }));
    const cartSubdeptSelect = root.querySelector("#cart-subdept-select");
    if(cartSubdeptSelect){
      cartSubdeptSelect.addEventListener("change", e=>{ state.cartModal.subDept = e.target.value; });
    }
    const cartDepartmentSelect = root.querySelector("#cart-department-select");
    if(cartDepartmentSelect){
      cartDepartmentSelect.addEventListener("change", e=>{ state.cartModal.department = e.target.value; });
    }
    const cartFitSelect = root.querySelector("#cart-fit-select");
    if(cartFitSelect){
      cartFitSelect.addEventListener("change", e=>{ state.cartModal.fit = e.target.value; });
    }
    root.querySelectorAll("[data-gallery-thumb]").forEach(el=>el.addEventListener("click", ()=>{
      state.cartModal.activePhoto = Number(el.getAttribute("data-gallery-thumb")); render();
    }));
    const confirmAddCartBtn = root.querySelector("#confirm-addcart-btn");
    if(confirmAddCartBtn){
      confirmAddCartBtn.addEventListener("click", ()=>{
        const { product, size, subDept, department, fit } = state.cartModal;
        const hasSizes = product.sizes && product.sizes.length>0;
        const needsCategoryChoice = (product.subDepartments||[]).length>1;
        const needsFitChoice = (product.fitOptions||[]).length>1;
        const needsDepartmentChoice = !!product.showDepartmentToBuyers;
        if(needsCategoryChoice && !subDept){ showToast("Please select a category."); return; }
        if(needsFitChoice && !fit){ showToast("Please select a fit."); return; }
        if(needsDepartmentChoice && !department){ showToast("Please select your department."); return; }
        if(hasSizes && !size){ showToast("Please select a size."); return; }
        addToCart(product, size, subDept, department, fit);
        state.cartModal = null;
        render();
      });
    }
    root.querySelectorAll("[data-qty]").forEach(el=>el.addEventListener("click", ()=>{
      updateQty(el.getAttribute("data-qty"), Number(el.getAttribute("data-delta")));
    }));
    root.querySelectorAll("[data-remove]").forEach(el=>el.addEventListener("click", ()=>{
      removeFromCart(el.getAttribute("data-remove"));
    }));

    // checkout
    const nameInput = root.querySelector("#ck-name");
    if(nameInput){ nameInput.addEventListener("input", e=>{ state.checkout.customerName = e.target.value; }); }
    const refInput = root.querySelector("#ck-ref");
    if(refInput){ refInput.addEventListener("input", e=>{ state.checkout.paymentRef = e.target.value; }); }
    const installmentToggle = root.querySelector("#ck-installment-toggle");
    if(installmentToggle){
      installmentToggle.addEventListener("change", e=>{
        state.checkout.isInstallment = e.target.checked;
        render();
      });
    }
    root.querySelectorAll("[data-channel]").forEach(el=>el.addEventListener("click", ()=>{
      state.checkout.channel = el.getAttribute("data-channel"); render();
    }));
    const uploadTrigger = root.querySelector("#upload-trigger");
    const fileInput = root.querySelector("#ck-file");
    if(uploadTrigger && fileInput){
      uploadTrigger.addEventListener("click", ()=>fileInput.click());
      fileInput.addEventListener("change", e=>handleFileUpload(e.target.files[0]));
    }
    const submitBtn = root.querySelector("#submit-order");
    if(submitBtn){ submitBtn.addEventListener("click", submitOrder); }

    // track order
    root.querySelectorAll("[data-copy-ref]").forEach(copyRefBtn=>copyRefBtn.addEventListener("click", async ()=>{
      const ref = copyRefBtn.getAttribute("data-copy-ref");
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){
          await navigator.clipboard.writeText(ref);
        }else{
          // Fallback for contexts where the Clipboard API isn't available
          const tempInput = document.createElement("textarea");
          tempInput.value = ref;
          tempInput.style.position = "fixed";
          tempInput.style.opacity = "0";
          document.body.appendChild(tempInput);
          tempInput.select();
          document.execCommand("copy");
          document.body.removeChild(tempInput);
        }
        copyRefBtn.classList.add("copied");
        showToast("Reference number copied!");
        setTimeout(()=>{ copyRefBtn.classList.remove("copied"); }, 1500);
      }catch(e){
        showToast("Could not copy automatically — please select and copy manually.");
      }
    }));
    const trackThisOrderBtn = root.querySelector("#track-this-order-btn");
    if(trackThisOrderBtn){
      trackThisOrderBtn.addEventListener("click", ()=>{
        const ref = state.lastOrder ? state.lastOrder.ref : "";
        state.trackOrderInput = ref;
        state.view = "track";
        render();
        if(ref){ trackOrder(ref); }
      });
    }
    const trackRefInput = root.querySelector("#track-ref-input");
    if(trackRefInput){
      trackRefInput.addEventListener("input", e=>{ state.trackOrderInput = e.target.value; });
      trackRefInput.addEventListener("keydown", e=>{ if(e.key==="Enter"){ trackOrder(state.trackOrderInput); } });
    }
    const trackOrderBtn = root.querySelector("#track-order-btn");
    if(trackOrderBtn){ trackOrderBtn.addEventListener("click", ()=>trackOrder(state.trackOrderInput)); }

    // admin login
    const loginBtn = root.querySelector("#admin-login-btn");
    if(loginBtn){
      loginBtn.addEventListener("click", async ()=>{
        const val = root.querySelector("#admin-pass").value;
        if(val===ADMIN_PASSWORD){
          state.adminAuthed = true; render();
          await refreshOrders(); await refreshProducts();
        }
        else{ showToast("Incorrect password."); }
      });
    }
    root.querySelectorAll("[data-admintab]").forEach(el=>el.addEventListener("click", ()=>{
      state.adminTab = el.getAttribute("data-admintab"); render();
    }));
    root.querySelectorAll("[data-statusfilter]").forEach(el=>el.addEventListener("click", ()=>{
      state.statusFilter = el.getAttribute("data-statusfilter"); render();
    }));
    const refreshOrdersBtn = root.querySelector("#refresh-orders-btn");
    if(refreshOrdersBtn){ refreshOrdersBtn.addEventListener("click", refreshOrders); }
    const refreshProductsBtn = root.querySelector("#refresh-products-btn");
    if(refreshProductsBtn){ refreshProductsBtn.addEventListener("click", refreshProducts); }
    const productSearchInput = root.querySelector("#product-search-input");
    if(productSearchInput){
      productSearchInput.addEventListener("input", e=>{
        state.productSearchQuery = e.target.value;
        const cursorPos = e.target.selectionStart;
        render();
        const newInput = root.querySelector("#product-search-input");
        if(newInput){ newInput.focus(); newInput.setSelectionRange(cursorPos, cursorPos); }
      });
    }
    const refreshReviewsBtn = root.querySelector("#refresh-reviews-btn");
    if(refreshReviewsBtn){ refreshReviewsBtn.addEventListener("click", refreshReviews); }
    root.querySelectorAll("[data-reviewfilter]").forEach(el=>el.addEventListener("click", ()=>{
      state.reviewStatusFilter = el.getAttribute("data-reviewfilter"); render();
    }));
    root.querySelectorAll("[data-review-action]").forEach(el=>el.addEventListener("click", async ()=>{
      const action = el.getAttribute("data-review-action");
      const id = el.getAttribute("data-review-id");
      if(action==="approve"){ await moderateReview(id, "approved"); }
      else if(action==="reject"){ await moderateReview(id, "rejected"); }
      else if(action==="delete"){
        if(confirm("Delete this review permanently?")){ await removeReview(id); }
      }
    }));
    root.querySelectorAll("[data-openorder]").forEach(el=>el.addEventListener("click", ()=>{
      const o = state.orders.find(x=>x.id===el.getAttribute("data-openorder"));
      if(o) openAdminOrder(o);
    }));
    const closeOrderModal = root.querySelector("#close-order-modal");
    if(closeOrderModal){ closeOrderModal.addEventListener("click", ()=>{ state.adminSelectedOrder=null; render(); }); }
    const saveOrderBtn = root.querySelector("#save-order-btn");
    if(saveOrderBtn){
      saveOrderBtn.addEventListener("click", async ()=>{
        const amount = root.querySelector("#amount-input").value;
        const status = root.querySelector("#status-select").value;
        state.orderActionBusy = "saving"; render(); showGlobalLoading("Saving changes…");
        await updateOrderAmount(state.adminSelectedOrder.id, amount);
        await updateOrderStatus(state.adminSelectedOrder.id, status);
        state.orderActionBusy = null;
        state.adminSelectedOrder = null;
        render(); hideGlobalLoading();
      });
    }
    const delOrderBtn = root.querySelector("#delete-order-btn");
    if(delOrderBtn){
      delOrderBtn.addEventListener("click", async ()=>{
        await deleteOrder(state.adminSelectedOrder.id);
      });
    }
    const markFullyPaidBtn = root.querySelector("#mark-fully-paid-btn");
    if(markFullyPaidBtn){
      markFullyPaidBtn.addEventListener("click", ()=>{
        if(confirm("Mark the remaining balance as paid? This cannot be undone.")){
          markOrderAsFullyPaid(state.adminSelectedOrder.id);
        }
      });
    }

    // products
    const newProductBtn = root.querySelector("#new-product-btn");
    if(newProductBtn){ newProductBtn.addEventListener("click", ()=>openProductModal(null)); }
    const saveDownpaymentBtn = root.querySelector("#save-downpayment-btn");
    if(saveDownpaymentBtn){
      saveDownpaymentBtn.addEventListener("click", async ()=>{
        const val = Number(root.querySelector("#downpayment-percent-input").value) || 50;
        state.downPaymentPercent = val;
        showToast("Down payment percentage updated.");
        render();
        try{ await apiPost({ action: "updateSettings", settings: { downPaymentPercent: val } }); }
        catch(e){ showToast("Saved locally, but could not sync to the sheet."); }
      });
    }
    root.querySelectorAll("[data-editproduct]").forEach(el=>el.addEventListener("click", ()=>{
      openProductModal(state.products.find(p=>p.id===el.getAttribute("data-editproduct")));
    }));
    root.querySelectorAll("[data-delproduct]").forEach(el=>el.addEventListener("click", ()=>{
      deleteProduct(el.getAttribute("data-delproduct"));
    }));
    root.querySelectorAll("[data-toggleactive]").forEach(el=>el.addEventListener("click", ()=>{
      toggleProductActive(el.getAttribute("data-toggleactive"));
    }));
    const closeProductModal = root.querySelector("#close-product-modal");
    if(closeProductModal){ closeProductModal.addEventListener("click", ()=>{ if(state.productModal && state.productModal.saving) return; state.productModal=null; render(); }); }
    const pfName = root.querySelector("#pf-name");
    if(pfName){ pfName.addEventListener("input", e=>{ state.productModal.name = e.target.value; }); }
    const pfDescription = root.querySelector("#pf-description");
    if(pfDescription){ pfDescription.addEventListener("input", e=>{ state.productModal.description = e.target.value; }); }
    const pfUploadTrigger = root.querySelector("#pf-upload-trigger");
    const pfFileInput = root.querySelector("#pf-file");
    if(pfUploadTrigger && pfFileInput){
      pfUploadTrigger.addEventListener("click", ()=>pfFileInput.click());
      pfFileInput.addEventListener("change", e=>{
        const files = Array.from(e.target.files || []);
        if(files.length===0) return;
        let remaining = files.length;
        files.forEach(file=>{
          compressImageFile(file, 800, 0.75, (dataUrl)=>{
            state.productModal.photoItems.push({ key: uid("ph"), type:"new", base64: dataUrl });
            remaining -= 1;
            if(remaining===0) render();
          });
        });
      });
    }
    root.querySelectorAll("[data-remove-photo]").forEach(el=>el.addEventListener("click", (ev)=>{
      ev.stopPropagation();
      const key = el.getAttribute("data-remove-photo");
      state.productModal.photoItems = state.productModal.photoItems.filter(item=>item.key!==key);
      render();
    }));
    const pfSizechartUploadTrigger = root.querySelector("#pf-sizechart-upload-trigger");
    const pfSizechartFile = root.querySelector("#pf-sizechart-file");
    if(pfSizechartUploadTrigger && pfSizechartFile){
      pfSizechartUploadTrigger.addEventListener("click", ()=>pfSizechartFile.click());
      pfSizechartFile.addEventListener("change", e=>{
        const file = e.target.files && e.target.files[0];
        if(!file) return;
        compressImageFile(file, 1000, 0.8, (dataUrl)=>{
          state.productModal.sizeChartOverride = dataUrl;
          render();
        });
      });
    }
    const pfRemoveSizechart = root.querySelector("#pf-remove-sizechart");
    if(pfRemoveSizechart){
      pfRemoveSizechart.addEventListener("click", ()=>{
        state.productModal.sizeChartOverride = "";
        render();
      });
    }
    let dragKey = null;
    root.querySelectorAll("[data-photo-key]").forEach(el=>{
      el.addEventListener("dragstart", ()=>{ dragKey = el.getAttribute("data-photo-key"); el.classList.add("dragging"); });
      el.addEventListener("dragend", ()=>{ el.classList.remove("dragging"); });
      el.addEventListener("dragover", (ev)=>{ ev.preventDefault(); el.classList.add("drag-over"); });
      el.addEventListener("dragleave", ()=>{ el.classList.remove("drag-over"); });
      el.addEventListener("drop", (ev)=>{
        ev.preventDefault();
        el.classList.remove("drag-over");
        const targetKey = el.getAttribute("data-photo-key");
        if(!dragKey || dragKey===targetKey) return;
        const items = state.productModal.photoItems;
        const fromIdx = items.findIndex(i=>i.key===dragKey);
        const toIdx = items.findIndex(i=>i.key===targetKey);
        if(fromIdx===-1 || toIdx===-1) return;
        const [moved] = items.splice(fromIdx,1);
        items.splice(toIdx,0,moved);
        render();
      });
    });
    root.querySelectorAll("[data-size-toggle]").forEach(el=>el.addEventListener("click", ()=>{
      const v = el.getAttribute("data-size-toggle");
      const p = state.productModal;
      if(p.sizes.includes(v)){ p.sizes = p.sizes.filter(x=>x!==v); }
      else{ p.sizes.push(v); }
      render();
    }));
    root.querySelectorAll("[data-category-toggle]").forEach(el=>el.addEventListener("click", ()=>{
      const v = el.getAttribute("data-category-toggle");
      const p = state.productModal;
      if(!p.subDepartments) p.subDepartments = [];
      if(p.subDepartments.includes(v)){ p.subDepartments = p.subDepartments.filter(x=>x!==v); }
      else{ p.subDepartments.push(v); }
      render();
    }));
    root.querySelectorAll("[data-fit-toggle]").forEach(el=>el.addEventListener("click", ()=>{
      const v = el.getAttribute("data-fit-toggle");
      const p = state.productModal;
      if(!p.fitOptions) p.fitOptions = [];
      if(p.fitOptions.includes(v)){ p.fitOptions = p.fitOptions.filter(x=>x!==v); }
      else{ p.fitOptions.push(v); }
      render();
    }));
    const pfPrice = root.querySelector("#pf-price");
    if(pfPrice){ pfPrice.addEventListener("input", e=>{ state.productModal.price = Number(e.target.value); }); }
    const pfSizePricingToggle = root.querySelector("#pf-sizepricing-toggle");
    if(pfSizePricingToggle){
      pfSizePricingToggle.addEventListener("change", e=>{
        if(e.target.checked){
          if(!state.productModal.sizeTiers || !state.productModal.sizeTiers.length){
            state.productModal.sizeTiers = state.productModal.sizes.length ? [{ sizes: [...state.productModal.sizes], price: state.productModal.price||0 }] : [];
          }
        } else {
          state.productModal.sizeTiers = [];
        }
        render();
      });
    }
    root.querySelectorAll("[data-size-price]").forEach(el=>el.addEventListener("input", e=>{
      const targetSize = el.getAttribute("data-size-price");
      const newPrice = Number(e.target.value)||0;
      const p = state.productModal;
      // Remove this size from any existing tier
      p.sizeTiers.forEach(t=>{ t.sizes = t.sizes.filter(s=>s!==targetSize); });
      p.sizeTiers = p.sizeTiers.filter(t=>t.sizes.length>0);
      // Find or create a tier matching this price, add the size to it
      let tier = p.sizeTiers.find(t=>Number(t.price)===newPrice);
      if(!tier){ tier = { sizes: [], price: newPrice }; p.sizeTiers.push(tier); }
      tier.sizes.push(targetSize);
    }));
    const pfTag = root.querySelector("#pf-tag");
    if(pfTag){
      pfTag.addEventListener("change", e=>{
        state.productModal.tag = e.target.value;
      });
    }
    const pfShowDepartment = root.querySelector("#pf-show-department");
    if(pfShowDepartment){
      pfShowDepartment.addEventListener("change", e=>{
        state.productModal.showDepartmentToBuyers = e.target.checked;
      });
    }
    const pfShowSizeGuide = root.querySelector("#pf-show-sizeguide");
    if(pfShowSizeGuide){
      pfShowSizeGuide.addEventListener("change", e=>{
        state.productModal.showSizeGuide = e.target.checked;
      });
    }
    const pfFeatured = root.querySelector("#pf-featured");
    if(pfFeatured){
      pfFeatured.addEventListener("change", e=>{
        state.productModal.featured = e.target.checked;
      });
    }
    const pfPromoType = root.querySelector("#pf-promotype");
    if(pfPromoType){
      pfPromoType.addEventListener("change", e=>{
        state.productModal.promoType = e.target.value;
        state.productModal.promoValue = e.target.value==="discount" ? 0 : "";
        render();
      });
    }
    const pfPromoValue = root.querySelector("#pf-promovalue");
    if(pfPromoValue){
      pfPromoValue.addEventListener("input", e=>{
        state.productModal.promoValue = state.productModal.promoType==="discount" ? Number(e.target.value) : e.target.value;
      });
    }
    const saveProductBtn = root.querySelector("#save-product-btn");
    if(saveProductBtn){ saveProductBtn.addEventListener("click", saveProductModal); }
  }

  render();
  loadAll();
})();
</script>
</body>
</html>
