<style>
  :root{
    --orange:#ff6400;
    --purple:#5000b3;
    --white:#ffffff;
    --black:#0d0d0d;
    --grey-50:#f8f8f7;
    --grey-100:#eeeeec;
    --grey-300:#d6d6d3;
    --grey-500:#8c8c8a;
    --grey-700:#3a3a38;
    --danger:#b3261e;
    --success:#1f6b3d;
    --warn:#8a6d00;
    --radius:14px;
    --radius-sm:9px;
    --shadow: 0 2px 6px rgba(20,20,18,0.05), 0 14px 34px -12px rgba(20,20,18,0.16);
    --shadow-lg: 0 16px 40px -10px rgba(20,20,18,0.22), 0 30px 60px -20px rgba(255,100,0,0.08);
    --ease: cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 500px at 50% -10%, rgba(255,100,0,0.045), transparent 60%),
      linear-gradient(180deg, #fbfbfa 0%, #f3f3f1 100%),
      repeating-linear-gradient(135deg, rgba(0,0,0,0.018) 0 2px, transparent 2px 22px);
    color:var(--black);
    font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  #app{}
  button{font-family:inherit;cursor:pointer;transition:transform .15s var(--ease), background-color .2s var(--ease), border-color .2s var(--ease), color .2s var(--ease), box-shadow .2s var(--ease), opacity .2s var(--ease);}
  button:active{transform:scale(0.97);}
  input,select,textarea{font-family:inherit;transition:border-color .2s var(--ease), box-shadow .2s var(--ease);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--black) !important;box-shadow:0 0 0 3px rgba(13,13,13,0.08);}
  ::selection{background:var(--black);color:var(--white);}

  /* HEADER */
  header.topbar{
    background:rgba(255,255,255,0.85);
    -webkit-backdrop-filter:blur(14px) saturate(160%);
    backdrop-filter:blur(14px) saturate(160%);
    border-bottom:1px solid var(--grey-100);
    position:sticky;top:0;z-index:50;
  }
  .topbar-inner{
    max-width:1120px;margin:0 auto;padding:16px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .brand{display:flex;align-items:center;gap:12px;cursor:pointer;transition:opacity .2s var(--ease);}
  .brand-logo{height:40px;width:auto;}
  .brand-wordmark{color:var(--black);font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;display:flex;align-items:baseline;gap:8px;}
  .brand-wordmark .wm-main{font-weight:800;font-size:19px;letter-spacing:3px;}
  .brand-wordmark .wm-sub{font-weight:400;font-size:13px;letter-spacing:4px;}
  .brand:hover{opacity:0.75;}
  .admin-link{
    border:none;background:none;color:var(--grey-500);font-size:11px;font-weight:600;letter-spacing:1.5px;
    text-transform:uppercase;padding:6px 0;cursor:pointer;text-decoration:none;opacity:0.6;
  }
  .admin-link:hover{opacity:1;color:var(--black);}
  nav.tabs{display:flex;gap:4px;background:var(--grey-100);border-radius:999px;padding:4px;}
  nav.tabs button{
    border:none;background:transparent;padding:8px 18px;border-radius:999px;font-weight:700;font-size:12.5px;
    letter-spacing:0.4px;color:var(--grey-700);
  }
  nav.tabs button.active{background:var(--white);color:var(--black);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .cart-btn{
    position:relative;border:1.5px solid var(--black);background:var(--black);color:var(--white);
    padding:10px 18px;border-radius:999px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;
    box-shadow:0 6px 16px -6px rgba(0,0,0,0.4);
  }
  .cart-btn:hover{box-shadow:0 10px 22px -6px rgba(0,0,0,0.5);transform:translateY(-1px);}
  .cart-badge{
    background:var(--white);color:var(--black);border-radius:999px;font-size:11px;font-weight:800;
    min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px;
    animation:pop .25s var(--ease);
  }
  @keyframes pop{from{transform:scale(0.4);opacity:0;}to{transform:scale(1);opacity:1;}}

  /* MARQUEE */
  .marquee-strip{
    background:var(--black);color:var(--white);overflow:hidden;white-space:nowrap;
    padding:11px 0;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
    border-bottom:1px solid var(--grey-100);
  }
  .marquee-inner{
    display:inline-block;animation:marquee 30s linear infinite;
  }
  @keyframes marquee{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
  .marquee-sep{display:inline-block;margin:0 28px;opacity:0.4;}

  /* SHOP HERO */
  .shop-hero{
    background:radial-gradient(1000px 400px at 50% 0%, #1c1c1c, var(--black) 65%);
    color:var(--white);padding:64px 0 54px;text-align:center;margin-bottom:0;
    border-radius:0;position:relative;overflow:hidden;
  }
  .shop-hero::before{
    content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(45deg,rgba(255,255,255,0.02) 0,rgba(255,255,255,0.02) 1px,transparent 1px,transparent 40px);
  }
  .shop-hero-inner{position:relative;z-index:1;}
  .shop-hero h1{
    font-size:clamp(36px,8vw,72px);margin:0;letter-spacing:6px;font-weight:800;
    line-height:1;text-transform:uppercase;
  }
  .shop-hero .hero-est{
    display:flex;align-items:center;justify-content:center;gap:18px;
    font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.5);
    margin:14px 0 0;text-transform:uppercase;
  }
  .shop-hero .hero-est span{display:inline-block;width:40px;height:1px;background:rgba(255,255,255,0.3);}
  .shop-hero-logo{height:44px;width:auto;filter:invert(1);margin-bottom:20px;opacity:0.9;}

  /* PRODUCTS SECTION */
  .products-section{padding:32px 24px 90px;max-width:1120px;margin:0 auto;width:100%;}
  .section-label{
    font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
    color:var(--grey-500);margin-bottom:20px;
  }

  main{padding:0;}
  main.view-transition{animation:fadein .35s var(--ease);}
  @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

  /* SHOP */
  .shop-header{
    margin-bottom:28px;padding:44px 28px;max-width:1120px;margin-inline:auto;
    text-align:center;position:relative;
  }
  .shop-header::before{
    content:"";position:absolute;inset:0;z-index:-1;
    background:radial-gradient(600px 200px at 50% 0%, rgba(255,100,0,0.05), transparent 70%);
  }
  .shop-header h1{font-size:34px;margin:6px 0 10px;color:var(--black);letter-spacing:4px;font-weight:800;}
  .shop-header .est-line{
    display:flex;align-items:center;justify-content:center;gap:12px;font-size:12px;font-weight:700;
    letter-spacing:2px;color:var(--grey-700);margin:0 0 4px;text-transform:uppercase;
  }
  .shop-header .est-line span{display:inline-block;width:28px;height:1px;background:var(--grey-500);}
  .shop-header p{margin:0 auto;color:var(--grey-700);font-size:14.5px;line-height:1.6;max-width:460px;}

  .mini-carousel{
    max-width:1120px;margin:0 auto 32px;padding:0 24px;position:relative;
  }
  .mini-carousel-viewport{
    overflow:hidden;border-radius:var(--radius);box-shadow:var(--shadow);background:var(--grey-100);
    -webkit-mask-image:linear-gradient(90deg, transparent 0, black 24px, black calc(100% - 24px), transparent 100%);
    mask-image:linear-gradient(90deg, transparent 0, black 24px, black calc(100% - 24px), transparent 100%);
  }
  .mini-carousel-track{
    display:flex;width:max-content;animation:marqueeScroll var(--marquee-duration, 30s) linear infinite;
  }
  .mini-carousel:hover .mini-carousel-track{animation-play-state:paused;}
  .mini-carousel-card{
    position:relative;width:220px;height:170px;flex-shrink:0;margin-right:14px;border-radius:var(--radius-sm);
    overflow:hidden;background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .mini-carousel-card img{width:100%;height:100%;object-fit:contain;}
  .mini-carousel-caption{
    position:absolute;left:0;right:0;bottom:0;padding:8px 10px;
    background:linear-gradient(0deg, rgba(0,0,0,0.7), transparent);
    color:var(--white);font-size:12px;font-weight:700;letter-spacing:0.2px;
  }
  @keyframes marqueeScroll{
    from{ transform:translateX(0); }
    to{ transform:translateX(-50%); }
  }
  @media (prefers-reduced-motion: reduce){
    .mini-carousel-track{ animation:none; }
  }
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0;}
  .chip{
    border:1.5px solid var(--grey-300);background:var(--white);padding:7px 15px;border-radius:999px;
    font-size:13px;font-weight:600;color:var(--grey-700);
  }
  .chip:hover{border-color:var(--black);}
  .chip.active{border-color:var(--purple);background:var(--purple);color:var(--white);}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;max-width:1120px;margin:0 auto;padding:0 24px 20px;
  }
  .card{
    background:var(--white);overflow:hidden;border-radius:var(--radius);
    display:flex;flex-direction:column;box-shadow:var(--shadow);
    transition:transform .3s var(--ease), box-shadow .3s var(--ease), border-color .3s var(--ease);
    border:1px solid rgba(0,0,0,0.06);
  }
  .card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:rgba(255,100,0,0.18);}
  .card-img{
    height:250px;
    background:
      repeating-linear-gradient(135deg, rgba(0,0,0,0.025) 0 2px, transparent 2px 14px),
      linear-gradient(160deg,#f4f4f2,#e9e9e6);
    display:flex;align-items:center;justify-content:center;color:var(--grey-500);font-weight:700;font-size:11px;
    text-align:center;padding:10px;position:relative;overflow:hidden;letter-spacing:1px;text-transform:uppercase;
  }
  .card-img::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 50% 40%, rgba(0,0,0,0.03), transparent 65%);
  }
  .card-img span.ph-icon{display:block;font-size:22px;margin-bottom:6px;opacity:0.35;}
  .card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease);}
  .card:hover .card-img img{transform:scale(1.06);}
  .promo-badge{
    position:absolute;top:12px;left:12px;background:var(--black);color:var(--white);font-size:10px;font-weight:800;
    padding:5px 10px;border-radius:999px;letter-spacing:1px;box-shadow:0 4px 10px rgba(0,0,0,0.25);
  }
  .tag-badge{
    position:absolute;top:12px;right:12px;font-size:10px;font-weight:800;
    padding:5px 10px;border-radius:999px;letter-spacing:1px;box-shadow:0 4px 10px rgba(0,0,0,0.25);color:var(--white);
  }
  .tag-badge.tag-hot{background:var(--orange);}
  .tag-badge.tag-new{background:var(--purple);}
  .card-body{padding:18px;display:flex;flex-direction:column;gap:7px;flex:1;}
  .card-body h3{margin:0;font-size:13px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;}
  .card-price{font-weight:800;color:var(--black);font-size:16px;}
  .card-price .strike{text-decoration:line-through;color:var(--grey-500);font-weight:400;font-size:13px;margin-right:6px;}
  .installment-note{font-size:11px;color:var(--warn);font-weight:700;letter-spacing:0.5px;}
  select.mini{
    width:100%;padding:9px 10px;border:1.5px solid var(--grey-300);border-radius:var(--radius-sm);font-size:13px;background:var(--white);
  }
  .add-btn{
    margin-top:auto;background:var(--black);color:var(--white);border:none;padding:13px;border-radius:999px;
    font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
    transition:background .2s var(--ease), box-shadow .2s var(--ease), transform .15s var(--ease);
  }
  .add-btn:hover{background:var(--orange);box-shadow:0 6px 16px -4px rgba(255,100,0,0.45);transform:translateY(-1px);}
  .add-btn:active{transform:translateY(0);}
  .add-btn:disabled{background:var(--grey-300);cursor:not-allowed;box-shadow:none;transform:none;}
  .empty-state{
    text-align:center;padding:80px 20px;color:var(--grey-500);font-size:14px;
  }

  /* CART */
  .cart-item{
    background:var(--white);border-radius:var(--radius-sm);margin-bottom:10px;padding:16px;display:flex;gap:14px;align-items:center;
    box-shadow:var(--shadow);transition:box-shadow .2s var(--ease);
  }
  .cart-item:hover{box-shadow:var(--shadow-lg);}
  .cart-item .info{flex:1;}
  .cart-item .info h4{margin:0 0 4px;font-size:13px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
  .cart-item .info .meta{font-size:12px;color:var(--grey-700);}
  .qty-ctrl{display:flex;align-items:center;gap:10px;}
  .qty-ctrl button{
    width:28px;height:28px;border-radius:50%;border:1.5px solid var(--grey-300);background:var(--white);font-weight:800;
  }
  .qty-ctrl button:hover{border-color:var(--black);background:var(--black);color:var(--white);}
  .remove-x{border:none;background:none;color:var(--danger);font-weight:700;font-size:13px;}
  .remove-x:hover{text-decoration:underline;}
  .cart-summary{
    background:var(--white);border-radius:var(--radius);padding:22px;margin-top:18px;box-shadow:var(--shadow);
  }
  .summary-row{display:flex;justify-content:space-between;font-size:14px;margin-bottom:8px;color:var(--grey-700);}
  .summary-row.total{font-size:19px;font-weight:800;color:var(--black);border-top:1px solid var(--grey-300);padding-top:12px;margin-top:8px;}
  .primary-btn{
    width:100%;background:var(--black);color:var(--white);border:none;padding:15px;border-radius:999px;
    font-weight:800;font-size:12.5px;margin-top:14px;letter-spacing:1.5px;text-transform:uppercase;
    box-shadow:0 8px 20px -8px rgba(0,0,0,0.45);
  }
  .primary-btn:hover{background:#242424;box-shadow:0 12px 26px -8px rgba(0,0,0,0.5);}
  .primary-btn:disabled{background:var(--grey-300);cursor:not-allowed;box-shadow:none;}
  .secondary-btn{
    background:var(--white);border:1.5px solid var(--black);color:var(--black);padding:13px 20px;border-radius:999px;
    font-weight:800;font-size:12.5px;letter-spacing:1px;
  }
  .secondary-btn:hover{background:var(--black);color:var(--white);}

  /* CHECKOUT FORM */
  .form-card{background:var(--white);border-radius:var(--radius);padding:26px;box-shadow:var(--shadow);max-width:560px;margin:0 auto;}
  .field{margin-bottom:17px;}
  .field label{display:block;font-size:13px;font-weight:700;margin-bottom:7px;color:var(--grey-700);}
  .field input[type=text],.field input[type=number],.field input[type=password],.field select,.field textarea{
    width:100%;padding:11px 13px;border:1.5px solid var(--grey-300);border-radius:var(--radius-sm);font-size:14px;
  }
  .field small{color:var(--grey-500);font-size:12px;}
  .channel-grid{display:flex;gap:8px;flex-wrap:wrap;}
  .channel-opt{
    border:1.5px solid var(--grey-300);border-radius:var(--radius-sm);padding:10px 15px;font-weight:700;font-size:13px;background:var(--white);color:var(--grey-700);
  }
  .channel-opt.active{border-color:var(--orange);background:var(--orange);color:var(--white);}
  .upload-box{
    border:2px dashed var(--grey-300);border-radius:var(--radius-sm);padding:20px;text-align:center;color:var(--grey-500);font-size:13px;cursor:pointer;
    transition:border-color .2s var(--ease), background .2s var(--ease);
  }
  .upload-box:hover{border-color:var(--black);background:var(--grey-50);}
  .upload-box img{max-width:100%;max-height:180px;border-radius:10px;margin-top:10px;box-shadow:var(--shadow);}
  .photo-grid{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
  .photo-tile{
    position:relative;width:90px;height:90px;border-radius:var(--radius-sm);overflow:hidden;
    border:1.5px solid var(--grey-300);cursor:grab;background:var(--grey-50);
  }
  .photo-tile img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-tile.dragging{opacity:0.4;}
  .photo-tile.drag-over{border-color:var(--black);box-shadow:0 0 0 2px var(--black) inset;}
  .photo-tile .cover-tag{
    position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);color:var(--white);font-size:9px;
    font-weight:800;text-align:center;padding:2px 0;letter-spacing:.5px;text-transform:uppercase;
  }
  .photo-tile .remove-photo{
    position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;border:none;
    background:rgba(0,0,0,0.75);color:var(--white);font-weight:800;font-size:11px;line-height:1;cursor:pointer;
  }
  .photo-tile-add{
    width:90px;height:90px;border-radius:var(--radius-sm);border:2px dashed var(--grey-300);
    display:flex;align-items:center;justify-content:center;color:var(--grey-500);font-size:24px;cursor:pointer;background:var(--white);
  }
  .gallery-thumbs{display:flex;gap:8px;margin-top:10px;justify-content:center;flex-wrap:wrap;}
  .gallery-thumbs img{
    width:46px;height:46px;object-fit:cover;border-radius:8px;border:1.5px solid var(--grey-300);cursor:pointer;
    transition:border-color .2s var(--ease), transform .2s var(--ease);
  }
  .gallery-thumbs img:hover{transform:translateY(-2px);}
  .gallery-thumbs img.active{border-color:var(--black);}
  .order-summary-box{background:var(--grey-50);border-radius:var(--radius-sm);padding:15px;font-size:13px;margin-bottom:16px;}
  .order-summary-box .line{display:flex;justify-content:space-between;margin-bottom:5px;}

  /* CONFIRMATION */
  .confirm-card{
    background:var(--white);border-radius:var(--radius);padding:36px;text-align:center;box-shadow:var(--shadow-lg);max-width:480px;margin:0 auto;
    animation:riseIn .4s var(--ease);
  }
  @keyframes riseIn{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
  .confirm-icon{
    width:64px;height:64px;border-radius:50%;background:var(--success);color:var(--white);display:flex;
    align-items:center;justify-content:center;font-size:32px;margin:0 auto 16px;
    box-shadow:0 10px 24px -8px rgba(31,107,61,0.5);
  }
  .ref-code{
    background:var(--grey-100);color:var(--purple);font-weight:800;font-size:20px;padding:11px 18px;border-radius:var(--radius-sm);
    display:inline-block;letter-spacing:1px;
  }
  .ref-code-row{
    display:flex;align-items:center;justify-content:center;gap:8px;margin:12px 0;
  }
  .copy-ref-btn{
    background:var(--grey-100);border:none;width:42px;height:42px;border-radius:var(--radius-sm);
    display:flex;align-items:center;justify-content:center;color:var(--grey-700);flex-shrink:0;
    transition:background .2s var(--ease), color .2s var(--ease);
  }
  .copy-ref-btn:hover{background:var(--black);color:var(--white);}
  .copy-ref-btn.copied{background:var(--success);color:var(--white);}
  .copy-ref-btn.compact{width:30px;height:30px;}

  /* ADMIN */
  .admin-login{
    max-width:380px;margin:70px auto;background:var(--white);padding:40px 36px;border-radius:var(--radius);
    box-shadow:var(--shadow-lg);text-align:center;border-top:4px solid var(--orange);position:relative;
  }
  .admin-login h2{font-size:22px;margin:0 0 8px;letter-spacing:0.5px;}
  .admin-login p{margin-bottom:20px;line-height:1.5;}
  .admin-login .field{margin-bottom:16px;}
  .admin-login input{text-align:center;font-size:14px;}
  .status-pill{
    padding:4px 11px;border-radius:999px;font-size:11px;font-weight:800;display:inline-block;text-transform:uppercase;letter-spacing:.3px;
  }
  .status-Pending{background:#fff2df;color:var(--warn);}
  .status-Confirmed{background:#e5e5e5;color:var(--black);}
  .status-Paid{background:#e2f6ea;color:var(--success);}
  .status-Processing{background:#e0eefa;color:#0b6bb3;}
  .status-Shipped{background:#e0eefa;color:#0b6bb3;}
  .status-Completed{background:#e2f6ea;color:var(--success);}
  .status-Cancelled{background:#fbe4e4;color:var(--danger);}

  table.orders-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,0.06);}
  table.orders-table th{background:var(--grey-50);color:var(--grey-700);text-align:left;padding:13px 14px;font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;border-bottom:2px solid var(--purple);}
  table.orders-table td{padding:13px 14px;font-size:13px;border-bottom:1px solid var(--grey-100);}
  table.orders-table tr:last-child td{border-bottom:none;}
  table.orders-table tr.clickable{cursor:pointer;transition:background .15s var(--ease);}
  table.orders-table tr.clickable:hover{background:var(--grey-50);}

  .admin-stats-row{
    display:grid;grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));gap:12px;margin-bottom:24px;
  }
  .admin-stat-card{
    background:var(--white);border:1px solid rgba(0,0,0,0.06);border-radius:var(--radius-sm);
    padding:16px 18px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow);
    transition:transform .2s var(--ease), box-shadow .2s var(--ease);
  }
  .admin-stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .admin-stat-label{font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;color:var(--grey-500);}
  .admin-stat-value{font-size:22px;font-weight:800;color:var(--black);}
  .admin-stat-card.admin-stat-alert{border-color:rgba(255,100,0,0.3);}
  .admin-stat-card.admin-stat-alert .admin-stat-value{color:var(--orange);}

  .admin-tabs{display:flex;gap:8px;margin-bottom:20px;}
  .admin-tabs button{
    border:none;background:var(--grey-100);padding:10px 20px;border-radius:999px;font-weight:700;font-size:13px;color:var(--grey-700);
  }
  .admin-tabs button.active{background:var(--purple);color:var(--white);}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(10,10,10,0.55);display:flex;align-items:center;justify-content:center;
    z-index:200;padding:20px;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px);
    animation:fadein .2s var(--ease);
  }
  .modal-box{
    background:var(--white);border-radius:var(--radius);padding:28px;max-width:520px;width:100%;max-height:85vh;overflow:auto;
    position:relative;box-shadow:var(--shadow-lg);animation:riseIn .25s var(--ease);
  }
  .modal-box.modal-wide{max-width:880px;}
  .modal-columns{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start;}
  @media (max-width:760px){
    .modal-columns{grid-template-columns:1fr;}
  }
  .modal-close{
    position:absolute;top:16px;right:16px;border:none;background:var(--grey-100);width:30px;height:30px;border-radius:50%;font-weight:800;
  }
  .modal-close:hover{background:var(--black);color:var(--white);}
  .modal-box h2{margin-top:0;font-size:19px;letter-spacing:.2px;}
  .kv{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid var(--grey-100);}
  .kv b{color:var(--grey-700);}
  .admin-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
  .danger-btn{background:var(--white);border:1.5px solid var(--danger);color:var(--danger);padding:10px 15px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;}
  .danger-btn:hover{background:var(--danger);color:var(--white);}

  .product-row-card{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);margin-bottom:12px;display:flex;gap:16px;align-items:center;transition:box-shadow .2s var(--ease);}
  .product-row-card:hover{box-shadow:var(--shadow-lg);}
  .product-row-card .swatch{width:56px;height:56px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--orange));flex-shrink:0;}
  .product-row-card .pinfo{flex:1;}
  .product-row-card .pinfo h4{margin:0 0 4px;font-size:14px;}
  .product-row-card .pinfo .tags{font-size:12px;color:var(--grey-700);}
  .icon-btn{border:none;background:var(--grey-100);padding:8px 13px;border-radius:var(--radius-sm);font-weight:700;font-size:12px;color:var(--grey-700);}
  .icon-btn.edit{background:var(--grey-100);color:var(--black);}
  .icon-btn.edit:hover{background:var(--black);color:var(--white);}
  .icon-btn.del{background:#fbe4e4;color:var(--danger);}
  .icon-btn.del:hover{background:var(--danger);color:var(--white);}
  .toggle-pill{border:none;padding:6px 13px;border-radius:999px;font-size:11px;font-weight:800;}
  .toggle-on{background:#e2f6ea;color:var(--success);}
  .toggle-off{background:var(--grey-100);color:var(--grey-500);}

  .checkbox-row{display:flex;gap:8px;flex-wrap:wrap;}
  .checkbox-pill{border:1.5px solid var(--grey-300);border-radius:var(--radius-sm);padding:7px 13px;font-size:12px;font-weight:700;color:var(--grey-700);background:var(--white);cursor:pointer;}
  .checkbox-pill.active{border-color:var(--purple);background:var(--purple);color:var(--white);}

  .toast{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--black);color:var(--white);
    padding:13px 22px;border-radius:16px;font-size:13px;font-weight:600;z-index:300;box-shadow:0 10px 30px rgba(0,0,0,0.35);
    animation:toastIn .3s var(--ease);max-width:min(320px, calc(100vw - 40px));text-align:center;line-height:1.4;
  }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px);}to{opacity:1;transform:translate(-50%,0);}}
  .brand-loading{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:100px 20px;text-align:center;min-height:40vh;
  }
  .brand-loading img{
    width:120px;height:auto;
    animation:logoGlow 1.8s ease-in-out infinite;
  }
  .brand-loading p{
    margin:22px 0 0;color:var(--grey-500);font-size:13px;font-weight:700;
    letter-spacing:1px;text-transform:uppercase;
    animation:fadePulse 1.8s ease-in-out infinite;
  }
  @keyframes logoGlow{
    0%, 100%{ filter:drop-shadow(0 0 0px rgba(255,100,0,0)); opacity:0.85; transform:scale(0.98); }
    50%{ filter:drop-shadow(0 0 18px rgba(255,100,0,0.45)); opacity:1; transform:scale(1.03); }
  }
  @keyframes fadePulse{
    0%, 100%{ opacity:0.5; }
    50%{ opacity:1; }
  }
  .global-loading-overlay{
    position:fixed;inset:0;background:rgba(10,10,10,0.72);backdrop-filter:blur(2px);
    z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;
    animation:fadein .2s var(--ease);
  }
  .global-loading-overlay img{
    width:80px;height:auto;
    animation:logoGlowWhite 1.6s ease-in-out infinite;
  }
  .global-loading-bars{
    display:flex;align-items:flex-end;gap:5px;height:28px;margin-top:22px;
  }
  .global-loading-bars span{
    display:inline-block;width:4px;border-radius:2px;background:var(--orange);
    animation:barWave 1.1s ease-in-out infinite;
  }
  .global-loading-bars span:nth-child(1){ animation-delay:0s; }
  .global-loading-bars span:nth-child(2){ animation-delay:0.1s; }
  .global-loading-bars span:nth-child(3){ animation-delay:0.2s; }
  .global-loading-bars span:nth-child(4){ animation-delay:0.3s; }
  .global-loading-bars span:nth-child(5){ animation-delay:0.2s; }
  .global-loading-bars span:nth-child(6){ animation-delay:0.1s; }
  .global-loading-bars span:nth-child(7){ animation-delay:0s; }
  .global-loading-overlay p{
    margin:16px 0 0;color:rgba(255,255,255,0.85);font-size:12px;font-weight:700;
    letter-spacing:1.5px;text-transform:uppercase;
  }
  @keyframes logoGlowWhite{
    0%, 100%{ filter:drop-shadow(0 0 0px rgba(255,100,0,0)) brightness(1); opacity:0.85; transform:scale(0.97); }
    50%{ filter:drop-shadow(0 0 16px rgba(255,100,0,0.6)) brightness(1.1); opacity:1; transform:scale(1.04); }
  }
  @keyframes barWave{
    0%, 100%{ height:6px; }
    50%{ height:28px; }
  }
  @media (max-width:640px){
    nav.tabs{display:none;}
    .topbar-inner{gap:10px;}
    .brand-wordmark .wm-main{font-size:14px;letter-spacing:1.5px;}
    .brand-wordmark .wm-sub{font-size:10px;letter-spacing:2px;}
    .brand-logo{height:30px;}
  }
</style>

  function renderGlobalLoadingOverlay(){

  // ---------- Google Sheet backend (via Apps Script Web App) ----------
  function apiConfigured(){ return API_URL && API_URL.indexOf("PASTE_YOUR") === -1; }

  async function apiGet(action, extraParams){
    let url = API_URL + "?action=" + encodeURIComponent(action) + "&t=" + Date.now();
    if(extraParams){
      Object.keys(extraParams).forEach(key=>{
        url += "&" + encodeURIComponent(key) + "=" + encodeURIComponent(extraParams[key]);
      });
    }
    const res = await fetch(url);
    if(!res.ok) throw new Error("Request failed: " + res.status);
    return res.json();
  }
  async function apiPost(payload){
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // avoids CORS preflight on Apps Script
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error("Request failed: " + res.status);
    const data = await res.json();
    if(data && data.error) throw new Error(data.error);
    return data;
  }

  async function loadAll(){
    if(!apiConfigured()){
      state.products = SEED_PRODUCTS;
      state.orders = [];
      state.loaded = true;
      showToast("Not connected to Google Sheet yet — showing sample products.");
      render();
      return;
    }
    try{
      const data = await apiGet("getAll");
      state.products = data.products || [];
      // Orders are intentionally not part of the public getAll response — see
      // backend comment. Admin fetches them separately via refreshOrders()
      // after authenticating; buyers look up a single order via trackOrder().
      state.reviews = data.reviews || [];
      if(data.settings && data.settings.downPaymentPercent){ state.downPaymentPercent = Number(data.settings.downPaymentPercent); }
    }catch(e){
      showToast("Could not load from Google Sheet. Check your connection.");
      state.products = state.products.length ? state.products : SEED_PRODUCTS;
    }
    state.loaded = true;
    render();
  }

  async function refreshOrders(){
    if(!apiConfigured()) return;
    state.syncing = true; render(); showGlobalLoading("Refreshing orders…");
    try{
      const data = await apiGet("getOrders");
      state.orders = data || [];
    }catch(e){ showToast("Could not refresh orders."); }
    state.syncing = false; render(); hideGlobalLoading();
  }

  async function trackOrder(ref){
    const trimmed = (ref||"").trim();
    if(!trimmed){ showToast("Please enter your order reference number."); return; }
    state.trackOrderSearching = true; state.trackOrderResult = null; render(); showGlobalLoading("Searching…");
    try{
      const result = await apiGet("getOrderByRef", { ref: trimmed });
      state.trackOrderResult = (result && result.error) ? "not_found" : result;
    }catch(e){
      showToast("Could not look up your order. Please check your connection and try again.");
      state.trackOrderResult = null;
    }
    state.trackOrderSearching = false; render(); hideGlobalLoading();
  }

  // ---------- Promo helpers ----------
  function priceForSize(product, size){
    if(product.sizeTiers && product.sizeTiers.length && size){
      const tier = product.sizeTiers.find(t=>t.sizes.includes(size));
      if(tier) return Number(tier.price)||0;
    }
    return Number(product.price)||0;
  }
  function priceInfo(product, size){
    const base = priceForSize(product, size);
    if(product.promoType==="discount"){
      const pct = Number(product.promoValue)||0;
      const finalP = +(base * (1 - pct/100)).toFixed(2);
      return {base, finalP, badge: pct+"% OFF"};
    }
    return {base, finalP: base, badge: null};
  }
  function priceRangeLabel(product){
    if(!product.sizeTiers || !product.sizeTiers.length) return null;
    const prices = product.sizeTiers.map(t=>Number(t.price)||0).filter(n=>n>0);
    if(!prices.length) return null;
    const min = Math.min(...prices), max = Math.max(...prices);
    return min===max ? money(min) : (money(min)+" – "+money(max));
  }

  // ---------- Reviews ----------
  function approvedReviewsFor(productId){
    return state.reviews.filter(r=>r.productId===productId && r.status==="approved");
  }
  function ratingSummary(productId){
    const approved = approvedReviewsFor(productId);
    if(!approved.length) return null;
    const avg = approved.reduce((sum,r)=>sum+r.rating,0) / approved.length;
    return { avg, count: approved.length };
  }
  function starsHtml(rating, size){
    size = size || 14;
    let html = "";
    for(let i=1;i<=5;i++){
      html += `<span style="font-size:${size}px;color:${i<=Math.round(rating)?'var(--orange)':'var(--grey-300)'};">★</span>`;
    }
    return html;
  }
  async function submitReview(){
    const rm = state.reviewModal;
    if(!rm.rating){ showToast("Please select a star rating."); return; }
    rm.submitting = true; render(); showGlobalLoading("Submitting your review…");
    const review = {
      id: uid("rv"), productId: rm.productId, rating: rm.rating,
      comment: (rm.comment||"").trim().slice(0,500),
      createdAt: new Date().toISOString()
    };
    try{
      await apiPost({ action:"addReview", review });

  // ---------- Cart ----------
  function addToCart(product, size, chosenSubDept, chosenDepartment, chosenFit){
    const hasSizes = product.sizes && product.sizes.length>0;
    if(hasSizes && !size){ showToast("Please select a size."); return; }
    const effectiveSize = hasSizes ? size : "One size";
    const productCategories = product.subDepartments || [];
    let category;
    if(chosenSubDept){ category = chosenSubDept; }
    else if(productCategories.length===1){ category = productCategories[0]; }
    else if(productCategories.length>1){ category = productCategories.join(", "); }
    else{ category = "Uncategorized"; }
    const productFits = product.fitOptions || [];
    let fitChoice = "";
    if(chosenFit){ fitChoice = chosenFit; }
    else if(productFits.length===1){ fitChoice = productFits[0]; }
    const embroideryDept = product.showDepartmentToBuyers ? (chosenDepartment || "") : "";
    const {finalP} = priceInfo(product, effectiveSize);
    const existing = state.cart.find(c=>c.productId===product.id && c.size===effectiveSize && c.subDept===category && c.embroideryDept===embroideryDept && c.fit===fitChoice);
    if(existing){ existing.qty += 1; }
    else{
      state.cart.push({
        cartId: uid("c"), productId: product.id, name: product.name,
        subDept: category, embroideryDept: embroideryDept, fit: fitChoice, size: effectiveSize, unitPrice: finalP, qty: 1,
        promoLabel: product.promoType==="discount" ? (product.promoValue+"% off") : (product.promoType==="installment" ? String(product.promoValue) : null)
      });
    }
    showToast(product.name+" added to cart.");
    render();
  }
  function updateQty(cartId, delta){
    const item = state.cart.find(c=>c.cartId===cartId);
    if(!item) return;
    item.qty += delta;
    if(item.qty<=0){ state.cart = state.cart.filter(c=>c.cartId!==cartId); }
    render();
  }
  function removeFromCart(cartId){
    state.cart = state.cart.filter(c=>c.cartId!==cartId);

  function cartTotal(){ return state.cart.reduce((s,c)=>s+c.unitPrice*c.qty,0); }
  function cartCount(){ return state.cart.reduce((s,c)=>s+c.qty,0); }

  // ---------- Checkout submit ----------
  async function submitOrder(){
    const ck = state.checkout;
    if(!ck.customerName.trim()){ showToast("Please enter your name for the order."); return; }
    if(!ck.paymentRef.trim()){ showToast("Please enter your payment reference number."); return; }
    if(!ck.screenshotBase64){ showToast("Please upload your payment screenshot."); return; }
    if(state.cart.length===0){ showToast("Your cart is empty."); return; }
    if(!apiConfigured()){ showToast("Shop isn't connected to the Google Sheet yet."); return; }

    const ref = genOrderRef();
    const total = cartTotal();
    const downPct = state.downPaymentPercent || 50;
    const amountDue = ck.isInstallment ? +(total * downPct/100).toFixed(2) : total;
    const amountRemaining = ck.isInstallment ? +(total - amountDue).toFixed(2) : 0;
    const order = {
      id: uid("o"), ref,
      customerName: ck.customerName.trim(),
      items: state.cart.map(c=>({productId:c.productId,name:c.name,subDept:c.subDept,embroideryDept:c.embroideryDept,fit:c.fit,size:c.size,qty:c.qty,unitPrice:c.unitPrice,promoLabel:c.promoLabel})),
      total: total,
      isInstallment: ck.isInstallment,
      downPaymentPercent: ck.isInstallment ? downPct : null,
      amountDue: amountDue,
      amountPaid: amountDue,
      amountRemaining: amountRemaining,
      paymentChannel: ck.channel,
      paymentRef: ck.paymentRef.trim(),
      status: "Pending",
      createdAt: new Date().toISOString(),
      screenshotBase64: ck.screenshotBase64
    };

    state.checkout.submitting = true; render(); showGlobalLoading("Placing your order…");
    try{
      const result = await apiPost({ action: "addOrder", order });
      delete order.screenshotBase64;
      order.screenshotUrl = result.screenshotUrl || "";
      state.orders.unshift(order);
      state.lastOrder = order;
      state.cart = [];
      state.checkout = { customerName:"", channel:"GCash", paymentRef:"", screenshotBase64:null, screenshotName:"", isInstallment:false };
      state.view = "confirm";
    }catch(e){
      showToast("Could not submit order. Please check your connection and try again.");
      state.checkout.submitting = false;
    }
    render(); hideGlobalLoading();
  }

  function compressImageFile(file, maxW, quality, callback){
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
      const img = new Image();
      img.onload = function(){
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width*scale;
        canvas.height = img.height*scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        callback(canvas.toDataURL("image/jpeg",quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
  function handleFileUpload(file){
    if(!file) return;
    compressImageFile(file, 900, 0.72, (dataUrl)=>{
      state.checkout.screenshotBase64 = dataUrl;
      state.checkout.screenshotName = file.name;
      render();
    });
  }

    };
    // Working list of photo items for the modal: { key, type:'existing'|'new', url|base64 }
    const existingPhotos = (base.photos && base.photos.length) ? base.photos : (base.imageUrl ? [base.imageUrl] : []);

  async function saveProductModal(){
    const p = state.productModal;
    if(!p.name.trim()){ showToast("Product name is required."); return; }
    p.saving = true;
    render(); showGlobalLoading("Saving product…");

    const idx = state.products.findIndex(x=>x.id===p.id);
    const isNew = idx<0;
    const payload = Object.assign({}, p, {
      photos: p.photoItems.map(item => item.type==="existing" ? { type:"existing", url:item.url } : { type:"new", base64:item.base64 })
    });
    delete payload.photoItems;
    delete payload.saving;

    try{
      const result = await apiPost({ action: isNew ? "addProduct" : "updateProduct", product: payload });
      const previewPhotos = p.photoItems.map(item => item.type==="existing" ? item.url : item.base64);
      const localCopy = Object.assign({}, p, {
        photos: result.photos || previewPhotos,
        imageUrl: result.imageUrl || previewPhotos[0] || "",
        sizeChartOverride: (result.sizeChartOverride !== undefined) ? result.sizeChartOverride : p.sizeChartOverride
      });
      delete localCopy.photoItems;
      delete localCopy.saving;
      if(isNew){ state.products.push(localCopy); } else { state.products[idx] = localCopy; }
      state.productModal = null;
      showToast("Product saved.");
      render();
    }catch(e){
      p.saving = false;
      showToast("Could not save product to the sheet. Please try again.");
      render();
    }
    hideGlobalLoading();
  }

    const { product, size, subDept, department, fit, activePhoto } = state.cartModal;
    const hasSizes = product.sizes && product.sizes.length>0;
    const productCategories = product.subDepartments || [];
    const productFits = product.fitOptions || [];
    const needsCategoryChoice = productCategories.length>1;
    const needsFitChoice = productFits.length>1;
    const needsDepartmentChoice = !!product.showDepartmentToBuyers;
    const {finalP} = priceInfo(product, hasSizes ? size : "One size");
    const isTiered = !!(product.sizeTiers && product.sizeTiers.length);
    const sizeChips = hasSizes ? product.sizes.map(s=>`<button type="button" class="checkbox-pill ${size===s?'active':''}" data-modal-size="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join("") : "";
    const categoryOpts = productCategories.map(c=>`<option value="${escapeHtml(c)}" ${subDept===c?"selected":""}>${escapeHtml(c)}</option>`).join("");
    const fitOpts = productFits.map(f=>`<option value="${escapeHtml(f)}" ${fit===f?"selected":""}>${escapeHtml(f)}</option>`).join("");
    const departmentOpts = DEPARTMENT_OPTIONS.map(d=>`<option value="${escapeHtml(d)}" ${department===d?"selected":""}>${escapeHtml(d)}</option>`).join("");
    const photos = product.photos || [];
    const mainPhoto = photos[activePhoto] || photos[0] || null;
    const galleryHtml = photos.length>0 ? `
      <div class="card-img" data-open-photo-zoom="1" style="height:320px;margin-bottom:12px;background:#f1f1ef;cursor:zoom-in;">
        ${mainPhoto ? `<img src="${mainPhoto}" alt="${escapeHtml(product.name)}" style="object-fit:contain;" />` : escapeHtml(product.name)}
      </div>
      ${mainPhoto?`<div style="text-align:center;margin-top:-8px;margin-bottom:10px;"><small style="color:var(--grey-500);">Tap photo to zoom in</small></div>`:""}
      ${photos.length>1 ? `<div class="gallery-thumbs">${photos.map((url,i)=>`<img src="${url}" class="${i===activePhoto?'active':''}" data-gallery-thumb="${i}" />`).join("")}</div>` : ""}
    ` : "";
    const priceDisplay = (isTiered && hasSizes && !size)
      ? `<div class="card-price" style="margin-bottom:2px;">${priceRangeLabel(product)}</div><small style="color:var(--grey-500);display:block;margin-bottom:14px;">Select a size to see the exact price</small>`
      : `<div class="card-price" style="margin-bottom:14px;">${money(finalP)}</div>`;
    // Show as plain text when there's only one category (or none) — a dropdown with a single
    // option isn't a real choice. Only render the picker when the buyer actually has to choose.
    const singleCategoryLabel = (!needsCategoryChoice && productCategories.length===1) ? productCategories[0] : null;
    const singleFitLabel = (!needsFitChoice && productFits.length===1) ? productFits[0] : null;
    const infoLabelParts = [];
    if(singleCategoryLabel) infoLabelParts.push(singleCategoryLabel);
    if(singleFitLabel) infoLabelParts.push(singleFitLabel);
    const infoLabel = infoLabelParts.length ? infoLabelParts.join(" · ") : null;
    return `
      <div class="modal-overlay" id="modal-overlay-addcart">
        <div class="modal-box modal-wide">
          <button class="modal-close" id="close-addcart-modal">✕</button>
          <div class="modal-columns">
            <div>
              ${galleryHtml || `<div class="card-img" style="height:220px;margin-bottom:12px;"><span><span class="ph-icon">📷</span>${escapeHtml(product.name)}</span></div>`}
            </div>
            <div>
              <h2>${escapeHtml(product.name)}</h2>
              ${infoLabel?`<div style="margin-bottom:8px;"><small style="color:var(--grey-500);letter-spacing:0.5px;text-transform:uppercase;font-weight:700;">${escapeHtml(infoLabel)}</small></div>`:""}
              ${priceDisplay}
              ${product.description ? `<p style="font-size:13px;color:var(--grey-700);line-height:1.6;margin:0 0 16px;">${escapeHtml(product.description).replace(/\n/g,"<br>")}</p>` : ""}
              ${product.promoType==="installment"?`<div class="installment-note" data-open-installment-info="1" style="cursor:pointer;text-decoration:underline;margin-bottom:14px;">💳 0% Installment available (2 payments) — tap for details</div>`:""}
              ${needsCategoryChoice ? `
              <div class="field">
                <label>Category</label>
                <select class="mini" id="cart-subdept-select">
                  <option value="">Select a category</option>
                  ${categoryOpts}
                </select>
              </div>` : ""}
              ${needsFitChoice ? `
              <div class="field">
                <label>Fit</label>
                <select class="mini" id="cart-fit-select">
                  <option value="">Select a fit</option>
                  ${fitOpts}
                </select>
              </div>` : ""}
              ${needsDepartmentChoice ? `
              <div class="field">
                <label>Department <small style="color:var(--grey-500);font-weight:400;">(for embroidery on the item)</small></label>
                <select class="mini" id="cart-department-select">
                  <option value="">Select your department</option>
                  ${departmentOpts}
                </select>
              </div>` : ""}
              ${hasSizes ? `
              <div class="field">
                <label>Size ${product.showSizeGuide!==false?`<span data-open-size-guide="1" style="cursor:pointer;text-decoration:underline;font-weight:400;color:var(--grey-600);font-size:11px;">(Size Guide)</span>`:""}</label>
                <div class="checkbox-row">${sizeChips}</div>
              </div>` : ""}
              <button class="primary-btn" id="confirm-addcart-btn">Add to Cart</button>
            </div>
          </div>
          ${renderProductReviewsSection(product.id)}
        </div>
      </div>
    `;
  }

  function renderProductReviewsSection(productId){
    const approved = approvedReviewsFor(productId);
    const rating = ratingSummary(productId);
    const reviewsHtml = approved.length ? approved.slice(0,5).map(r=>`
      <div style="border-top:1px solid var(--grey-100);padding:10px 0;">
        <div>${starsHtml(r.rating,12)}</div>
        ${r.comment ? `<p style="margin:4px 0 0;font-size:13px;color:var(--grey-700);">${escapeHtml(r.comment)}</p>` : ""}
      </div>
    `).join("") : `<p style="font-size:13px;color:var(--grey-500);margin-top:8px;">No reviews yet. Be the first to leave one.</p>`;
    return `
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--grey-200);">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <h3 style="font-size:14px;margin:0;">Reviews ${rating?`<span style="font-weight:400;color:var(--grey-500);">(${rating.count})</span>`:""}</h3>
          <button class="secondary-btn" style="width:auto;padding:8px 14px;font-size:12px;" data-write-review="${productId}">Write a review</button>
        </div>
        ${rating?`<div style="display:flex;align-items:center;gap:6px;margin-top:6px;">${starsHtml(rating.avg,16)}<b style="font-size:14px;">${rating.avg.toFixed(1)}</b></div>`:""}
        <div style="max-height:260px;overflow-y:auto;margin-top:4px;">${reviewsHtml}</div>
      </div>
    `;
  }

  function renderWriteReviewModal(){
    const rm = state.reviewModal;
    const product = state.products.find(p=>p.id===rm.productId);
    const starButtons = [1,2,3,4,5].map(n=>`
      <button type="button" data-star="${n}" style="background:none;border:none;font-size:32px;cursor:pointer;padding:2px;color:${n<=rm.rating?'var(--orange)':'var(--grey-300)'};">★</button>
    `).join("");
    return `
      <div class="modal-overlay" id="modal-overlay-writereview">
        <div class="modal-box">
          <button class="modal-close" id="close-writereview-modal">✕</button>
          <h2>Rate this product</h2>
          <p style="font-size:13px;color:var(--grey-500);margin-top:-4px;">${escapeHtml(product ? product.name : "")}</p>
          <div style="text-align:center;margin:16px 0;">${starButtons}</div>
          <div class="field">
            <label>Comment <small style="color:var(--grey-500);font-weight:400;">(optional, max 500 characters)</small></label>
            <textarea id="review-comment-input" rows="4" maxlength="500" placeholder="Tell others what you think..." style="width:100%;padding:10px;border:1.5px solid var(--grey-300);border-radius:var(--radius-sm);font-family:inherit;font-size:13px;resize:vertical;">${escapeHtml(rm.comment||"")}</textarea>
          </div>
          <p style="font-size:11px;color:var(--grey-500);">Reviews are posted anonymously and reviewed by our team before appearing publicly.</p>
          <button class="primary-btn" id="submit-review-btn" ${rm.submitting?"disabled":""}>Submit Review</button>
        </div>
      </div>
    `;
  }

  function renderCart(){
    if(state.cart.length===0){
      return `<div class="empty-state">Your cart is empty.<br><br><button class="secondary-btn" data-nav="shop">Continue Shopping</button></div>`;
    }
    const items = state.cart.map(c=>`
      <div class="cart-item">
        <div class="info">
          <h4>${escapeHtml(c.name)}</h4>
          <div class="meta">${escapeHtml(c.subDept)}${c.fit?` · ${escapeHtml(c.fit)}`:""}${c.embroideryDept?` · Embroidery: ${escapeHtml(c.embroideryDept)}`:""}${c.size && c.size!=="One size" ? " · Size "+escapeHtml(c.size) : ""} · ${money(c.unitPrice)} each${c.promoLabel?" · "+escapeHtml(c.promoLabel):""}</div>
        </div>
        <div class="qty-ctrl">
          <button data-qty="${c.cartId}" data-delta="-1">−</button>
          <span>${c.qty}</span>
          <button data-qty="${c.cartId}" data-delta="1">+</button>
        </div>
        <button class="remove-x" data-remove="${c.cartId}">Remove</button>
      </div>`).join("");

    return `
      <h1 style="font-size:22px;margin-bottom:16px;">Your Cart</h1>
      ${items}
      <div class="cart-summary">
        <div class="summary-row total"><span>Total</span><span>${money(cartTotal())}</span></div>
        <button class="primary-btn" data-nav="checkout">Proceed to Checkout</button>
      </div>
    `;
  }

  function renderCheckout(){
    const ck = state.checkout;
    const lines = state.cart.map(c=>`<div class="line"><span>${escapeHtml(c.name)} (${escapeHtml(c.subDept)}${c.fit?", "+escapeHtml(c.fit):""}${c.embroideryDept?", embroidery: "+escapeHtml(c.embroideryDept):""}${c.size && c.size!=="One size" ? ", "+escapeHtml(c.size) : ""}) x${c.qty}</span><span>${money(c.unitPrice*c.qty)}</span></div>`).join("");
    const channels = CHANNEL_OPTIONS.map(ch=>`<button class="channel-opt ${ck.channel===ch?'active':''}" data-channel="${escapeHtml(ch)}">${escapeHtml(ch)}</button>`).join("");
    const total = cartTotal();
    const hasInstallmentItem = state.cart.some(c=>{
      const prod = state.products.find(p=>p.id===c.productId);
      return prod && prod.promoType==="installment";
    });
    const downPct = state.downPaymentPercent || 50;
    const downAmount = +(total * downPct/100).toFixed(2);
    const remainingAmount = +(total - downAmount).toFixed(2);
    const amountDueBox = ck.isInstallment ? `
      <div style="background:var(--grey-50);border:1px solid var(--grey-200);border-radius:10px;padding:14px;margin-top:10px;">
        <div class="line"><span>Total order</span><span>${money(total)}</span></div>
        <div class="line" style="font-weight:800;"><span>Due now (${downPct}%)</span><span>${money(downAmount)}</span></div>
        <div class="line" style="color:var(--grey-500);"><span>Remaining before release</span><span>${money(remainingAmount)}</span></div>
      </div>` : "";

    return `
      <h1 style="font-size:22px;margin-bottom:16px;">Checkout</h1>
      <div class="form-card">
        <div class="order-summary-box">
          ${lines}
          <div class="line" style="font-weight:800;border-top:1px dashed var(--grey-300);padding-top:6px;margin-top:6px;"><span>Total</span><span>${money(total)}</span></div>
        </div>

        ${hasInstallmentItem ? `
        <div class="field">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="ck-installment-toggle" ${ck.isInstallment?"checked":""} style="width:auto;" />
            I'm paying via installment (${downPct}% now, remainder before release)
          </label>
          ${amountDueBox}
        </div>` : ""}

        <div class="field">
          <label>Order name (your full name)</label>
          <input type="text" id="ck-name" value="${escapeHtml(ck.customerName)}" placeholder="e.g. Juan Dela Cruz" />
        </div>

        <div class="field">
          <label>Payment channel</label>
          <div class="channel-grid">${channels}</div>
        </div>

        <div class="field">
          <label>Scan to pay (GCash / InstaPay)</label>
          <div class="qr-box" style="text-align:center;background:var(--grey-50);border:1px solid var(--grey-200);border-radius:10px;padding:16px;">
            <img src="${GCASH_QR_SRC}" alt="GCash InstaPay QR code" style="max-width:220px;width:100%;border-radius:8px;" />
            <small style="display:block;margin-top:8px;color:var(--grey-600);">We only accept payment via GCash (from GCash or any other bank via InstaPay).</small>
          </div>
        </div>

        <div class="field">
          <label>Payment reference number</label>
          <input type="text" id="ck-ref" value="${escapeHtml(ck.paymentRef)}" placeholder="e.g. GCash reference number" />
        </div>

        <div class="field">
          <label>Upload payment screenshot ${ck.isInstallment?"(for this installment payment)":""}</label>
          <div class="upload-box" id="upload-trigger">
            ${ck.screenshotBase64 ? `<div>✅ ${escapeHtml(ck.screenshotName)}</div><img src="${ck.screenshotBase64}" />` : "Click to upload your payment screenshot"}
          </div>
          <input type="file" id="ck-file" accept="image/*" style="display:none;" />
          <small>JPG or PNG. We'll use this to verify your payment.</small>
        </div>

        <button class="primary-btn" id="submit-order" ${ck.submitting?"disabled":""}>Submit Order</button>
        <button class="secondary-btn" style="width:100%;margin-top:8px;" data-nav="cart">Back to Cart</button>
      </div>
    `;
  }

  function renderConfirm(){
    const o = state.lastOrder;
    if(!o) return `<div class="empty-state">No recent order.<br><br><button class="secondary-btn" data-nav="shop">Back to Shop</button></div>`;
    const installmentBox = o.isInstallment ? `
      <div style="background:var(--grey-50);border:1px solid var(--grey-200);border-radius:10px;padding:14px;margin-top:14px;text-align:left;">
        <div class="line"><span>Order total</span><span>${money(o.total)}</span></div>
        <div class="line" style="font-weight:800;"><span>Paid now (${o.downPaymentPercent}%)</span><span>${money(o.amountPaid)}</span></div>
        <div class="line" style="color:var(--grey-500);"><span>Remaining before release</span><span>${money(o.amountRemaining)}</span></div>
      </div>` : "";
    return `
      <div class="confirm-card">
        <div class="confirm-icon">✓</div>
        <h2>Order received!</h2>
        <p>Thanks, ${escapeHtml(o.customerName)}. We'll verify your payment and confirm your order shortly.</p>
        <div class="ref-code-row">
          <div class="ref-code">${escapeHtml(o.ref)}</div>
          ${copyRefButton(o.ref)}
        </div>
        <p style="font-size:13px;color:var(--grey-700);">Save this reference number — you can check your order status anytime using the "Track Order" tab, or tap the button below.</p>
        <p style="font-weight:800;font-size:18px;margin-top:14px;">${money(o.isInstallment ? o.amountPaid : o.total)}${o.isInstallment?` <span style="font-size:12px;font-weight:400;color:var(--grey-500);">paid now</span>`:""}</p>
        ${installmentBox}
        <button class="secondary-btn" id="track-this-order-btn" style="margin-top:14px;width:100%;">Track This Order</button>
        <button class="primary-btn" data-nav="shop" style="margin-top:8px;">Continue Shopping</button>
      </div>
    `;
  }

  // ---------- Admin ----------
  function renderAdmin(){
    if(!state.adminAuthed){
      return `
        <div class="admin-login">
          <img src="${BRAND_LOGO_SRC}" alt="PRNTD Collective" style="width:88px;height:auto;margin:0 auto 20px;display:block;" />
          <h2>Admin Access</h2>
          <p style="font-size:13px;color:var(--grey-700);">Enter the admin password to manage orders, products, and reviews.</p>
          <div class="field"><input type="password" id="admin-pass" placeholder="Password" autocomplete="current-password" /></div>
          <button class="primary-btn" id="admin-login-btn">Log In</button>
        </div>
      `;
    }
    const pendingReviewCount = state.reviews.filter(r=>r.status==="pending").length;
    const pendingOrderCount = state.orders.filter(o=>o.status==="Pending").length;
    const totalRevenue = state.orders.reduce((sum,o)=>sum + (o.isInstallment ? (o.amountPaid||0) : o.total), 0);
    const outstandingBalance = state.orders.reduce((sum,o)=>sum + (o.amountRemaining||0), 0);
    const activeProductCount = state.products.filter(p=>p.active).length;
    return `
      <div class="admin-stats-row">
        <div class="admin-stat-card">
          <span class="admin-stat-label">Revenue Collected</span>
          <span class="admin-stat-value">${money(totalRevenue)}</span>
        </div>
        <div class="admin-stat-card ${outstandingBalance>0?'admin-stat-alert':''}">
          <span class="admin-stat-label">Outstanding Balance</span>
          <span class="admin-stat-value">${money(outstandingBalance)}</span>
        </div>
        <div class="admin-stat-card ${pendingOrderCount>0?'admin-stat-alert':''}">
          <span class="admin-stat-label">Pending Orders</span>
          <span class="admin-stat-value">${pendingOrderCount}</span>
        </div>
        <div class="admin-stat-card ${pendingReviewCount>0?'admin-stat-alert':''}">
          <span class="admin-stat-label">Reviews to Moderate</span>
          <span class="admin-stat-value">${pendingReviewCount}</span>
        </div>
        <div class="admin-stat-card">
          <span class="admin-stat-label">Active Products</span>
          <span class="admin-stat-value">${activeProductCount}</span>
        </div>
      </div>
      <div class="admin-tabs">
        <button data-admintab="orders" class="${state.adminTab==='orders'?'active':''}">Orders (${state.orders.length})</button>
        <button data-admintab="products" class="${state.adminTab==='products'?'active':''}">Products (${state.products.length})</button>
        <button data-admintab="reviews" class="${state.adminTab==='reviews'?'active':''}">Reviews ${pendingReviewCount>0?`<span style="background:var(--orange);color:white;border-radius:999px;padding:1px 7px;font-size:11px;margin-left:4px;">${pendingReviewCount}</span>`:""}</button>
      </div>
      ${state.adminTab==="orders" ? renderAdminOrders() : state.adminTab==="products" ? renderAdminProducts() : renderAdminReviews()}
      ${state.adminSelectedOrder ? renderOrderModal() : ""}
      ${state.productModal ? renderProductModal() : ""}
    `;
  }

  function renderAdminOrders(){
    const filters = ["All", ...STATUS_OPTIONS];
    const chips = filters.map(s=>`<button class="chip ${state.statusFilter===s?'active':''}" data-statusfilter="${s}">${s}</button>`).join("");
    let list = state.orders;
    if(state.statusFilter!=="All"){ list = list.filter(o=>o.status===state.statusFilter); }
    const rows = list.map(o=>`
      <tr class="clickable" data-openorder="${o.id}">
        <td>${escapeHtml(o.ref)}</td>
        <td>${escapeHtml(o.customerName)}</td>
        <td>${o.items.length} item(s)</td>
        <td>${money(o.total)}</td>
        <td>${o.isInstallment ? `<span style="color:var(--orange);font-weight:700;">💳 ${money(o.amountRemaining||0)} due</span>` : `<span style="color:var(--success);">Full</span>`}</td>
        <td>${escapeHtml(o.paymentChannel)}</td>
        <td><span class="status-pill status-${o.status}">${o.status}</span></td>
        <td>${new Date(o.createdAt).toLocaleDateString()}</td>
      </tr>
    `).join("");
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
        <div class="filter-row" style="margin:0;">${chips}</div>
        <button class="secondary-btn" id="refresh-orders-btn">↻ Refresh</button>
      </div>
      <table class="orders-table" style="margin-top:14px;">
        <thead><tr><th>Ref</th><th>Customer</th><th>Items</th><th>Amount</th><th>Payment</th><th>Channel</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${rows || `<tr><td colspan="8" style="text-align:center;color:var(--grey-500);padding:24px;">No orders found.</td></tr>`}</tbody>
      </table>
    `;
  }

  function renderAdminReviews(){
    const filters = ["Pending","Approved","Rejected"];
    const activeFilter = state.reviewStatusFilter || "Pending";
    const chips = filters.map(s=>`<button class="chip ${activeFilter===s?'active':''}" data-reviewfilter="${s}">${s}</button>`).join("");
    let list = state.reviews.filter(r=>r.status===activeFilter.toLowerCase());
    list = list.slice().sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    const rows = list.map(r=>{
      const product = state.products.find(p=>p.id===r.productId);
      return `
      <div style="background:var(--white);border:1px solid var(--grey-200);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">
          <div>
            <b style="font-size:13px;">${escapeHtml(product ? product.name : "Unknown product")}</b>
            <div>${starsHtml(r.rating,14)}</div>
          </div>
          <small style="color:var(--grey-500);">${new Date(r.createdAt).toLocaleDateString()}</small>
        </div>
        ${r.comment ? `<p style="font-size:13px;color:var(--grey-700);margin:8px 0;">${escapeHtml(r.comment)}</p>` : `<p style="font-size:13px;color:var(--grey-500);margin:8px 0;font-style:italic;">No comment provided.</p>`}
        <div style="display:flex;gap:8px;margin-top:8px;">
          ${activeFilter!=="Approved"?`<button class="secondary-btn" style="width:auto;padding:8px 14px;font-size:12px;" data-review-action="approve" data-review-id="${r.id}">✓ Approve</button>`:""}
          ${activeFilter!=="Rejected"?`<button class="danger-btn" style="width:auto;padding:8px 14px;font-size:12px;" data-review-action="reject" data-review-id="${r.id}">✕ Reject</button>`:""}
          <button class="icon-btn del" style="margin-left:auto;" data-review-action="delete" data-review-id="${r.id}">Delete</button>
        </div>
      </div>`;
    }).join("");
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
        <div class="filter-row" style="margin:0;">${chips}</div>
        <button class="secondary-btn" id="refresh-reviews-btn">↻ Refresh</button>
      </div>
      <div style="margin-top:14px;">
        ${rows || `<div class="empty-state">No ${activeFilter.toLowerCase()} reviews.</div>`}
      </div>
    `;
  }

  function renderTrackOrder(){
    const o = state.trackOrderResult;
    const statusColors = { Pending:"var(--warn)", Confirmed:"var(--success)", Paid:"var(--success)", Processing:"var(--orange)", Shipped:"var(--orange)", Completed:"var(--success)", Cancelled:"var(--danger)" };

    let resultHtml = "";
    if(o === "not_found"){
      resultHtml = `<div class="empty-state">No order found with that reference number. Please double-check and try again.</div>`;
    } else if(o){
      const itemsHtml = o.items.map(it=>`
        <div class="kv" style="align-items:flex-start;">
          <div>
            <b>${escapeHtml(it.name)}</b>
            <div style="font-size:12px;color:var(--grey-500);margin-top:2px;">
              ${escapeHtml(it.subDept||"Uncategorized")}${it.fit?` · ${escapeHtml(it.fit)}`:""} · Size: ${escapeHtml(it.size)} · Qty: ${it.qty}
